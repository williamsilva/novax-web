<form autocomplete="off" [formGroup]="resourceForm" (ngSubmit)="submitForm()">
  <p-tabView [(activeIndex)]="activeIndex">
    <p-tabPanel header="Dados" leftIcon="pi pi-home">
      <div class="p-fluid grid" style="margin-bottom: 0em; margin-top: 0em">
        <div class="col-6">
          <app-error-msg [control]="description" label="Descrição"></app-error-msg>
          <input
            pInputText
            type="text"
            formControlName="description"
            [class.ng-dirty]="error.hasControlErrors(description)"
          />
        </div>

        <div class="col-6" formGroupName="provider">
          <app-error-msg [control]="providerId" label="Fornecedor"></app-error-msg>
          <p-dropdown
            [filter]="true"
            filterBy="name"
            optionValue="id"
            optionLabel="name"
            formControlName="id"
            [options]="providers"
            optionDisabled="inactive"
            [autoDisplayFirst]="false"
            [resetFilterOnHide]="true"
            [class.ng-dirty]="error.hasControlErrors(providerId)"
          >
          </p-dropdown>
        </div>
      </div>

      <div class="p-fluid grid" style="margin-bottom: 0em; margin-top: 0em">
        <div class="col-3">
          <app-error-msg [control]="patrimonyNumber" label="N° Patrimônio"></app-error-msg>
          <input
            pInputText
            mask="0000"
            type="text"
            formControlName="patrimonyNumber"
            [class.ng-dirty]="error.hasControlErrors(patrimonyNumber)"
          />
        </div>

        <div class="col-3">
          <app-error-msg [control]="voltage" label="Alimentação"></app-error-msg>
          <p-dropdown
            inputId="dropdown"
            placeholder="Selecione"
            formControlName="voltage"
            [options]="voltageEquipmentEnum"
            [class.ng-dirty]="error.hasControlErrors(voltage)"
          >
          </p-dropdown>
        </div>

        <div class="col-3">
          <app-error-msg [control]="price" label="Valor"></app-error-msg>
          <p-inputNumber
            locale="pt-BR"
            currency="BRL"
            mode="currency"
            class="ng-invalid"
            formControlName="price"
            placeholder="E.g.: 20,00"
            [class.ng-dirty]="error.hasControlErrors(price)"
          ></p-inputNumber>
        </div>

        <div class="col-3">
          <app-error-msg [control]="status" label="Status"></app-error-msg>
          <p-dropdown
            inputId="dropdown"
            placeholder="Selecione"
            formControlName="status"
            optionDisabled="inactive"
            [options]="statusEquipmentEnum"
            [class.ng-dirty]="error.hasControlErrors(status)"
          >
          </p-dropdown>
        </div>
      </div>

      <div class="p-fluid grid" style="margin-bottom: 0em; margin-top: 0em">
        <div class="col-3">
          <app-error-msg [control]="buyDate" [required]="false" label="Data Compra"></app-error-msg>
          <p-calendar
            name="buyDate"
            appendTo="body"
            [inline]="false"
            [showIcon]="true"
            dateFormat="dd/mm/yy"
            class="p-calendar-sm"
            [yearNavigator]="true"
            [readonlyInput]="false"
            [monthNavigator]="true"
            formControlName="buyDate"
            [selectOtherMonths]="true"
            [class.ng-dirty]="error.hasControlErrors(buyDate)"
          >
          </p-calendar>
        </div>

        <div class="col-3">
          <app-error-msg [control]="arrivalDate" [required]="false" label="Data Chegada"></app-error-msg>
          <p-calendar
            appendTo="body"
            [inline]="false"
            [showIcon]="true"
            name="arrivalDate"
            dateFormat="dd/mm/yy"
            class="p-calendar-sm"
            [yearNavigator]="true"
            [readonlyInput]="false"
            [monthNavigator]="true"
            [selectOtherMonths]="true"
            formControlName="arrivalDate"
            [class.ng-dirty]="error.hasControlErrors(arrivalDate)"
          >
          </p-calendar>
        </div>

        <div class="col-3">
          <app-error-msg [control]="warrantyStart" [required]="false" label="Inicio Garantia"></app-error-msg>
          <p-calendar
            appendTo="body"
            [inline]="false"
            [showIcon]="true"
            name="warrantyStart"
            dateFormat="dd/mm/yy"
            class="p-calendar-sm"
            [yearNavigator]="true"
            [readonlyInput]="false"
            [monthNavigator]="true"
            [selectOtherMonths]="true"
            formControlName="warrantyStart"
            [class.ng-dirty]="error.hasControlErrors(warrantyStart)"
          >
          </p-calendar>
        </div>

        <div class="col-3">
          <app-error-msg [control]="warrantyEnd" [required]="false" label="Final Garantia"></app-error-msg>
          <p-calendar
            appendTo="body"
            [inline]="false"
            [showIcon]="true"
            name="warrantyEnd"
            dateFormat="dd/mm/yy"
            class="p-calendar-sm"
            [yearNavigator]="true"
            [readonlyInput]="false"
            [monthNavigator]="true"
            [selectOtherMonths]="true"
            formControlName="warrantyEnd"
            [class.ng-dirty]="error.hasControlErrors(warrantyEnd)"
          >
          </p-calendar>
        </div>
      </div>
    </p-tabPanel>

    <p-tabPanel header="Manutenções" leftIcon="fa-fw fas fa-tools" [disabled]="!isEditing">
      <app-maintenance [resources]="maintenances.value" [totalMaintenance]="totalMaintenance.value"></app-maintenance>
    </p-tabPanel>

    <p-tabPanel header="Histórico" leftIcon="pi pi-list" [disabled]="!isEditing">
      <app-historical [resources]="historical.value"></app-historical>
    </p-tabPanel>

    <p-tabPanel header="Observações" leftIcon="fa fa-book">
      <div class="p-fluid grid" style="margin-bottom: 0em; margin-top: 0em">
        <div class="col-12">
          <app-error-msg [control]="note" [required]="false" label="Observação"></app-error-msg>
          <textarea rows="5" cols="30" pInputTextarea formControlName="note"></textarea>
        </div>
      </div>
    </p-tabPanel>
  </p-tabView>

  <br />
  <br />
  <br />

  <div class="p-fluid grid" style="margin-bottom: -1em; margin-top: 0%">
    <div class="col-2 col-offset-8">
      <button
        pButton
        type="submit"
        label="Salvar"
        [loading]="loading"
        class="ui-button-success"
        style="display: inline-block"
        [disabled]="!auth.hasAnyPermission([wsPermissions.ROLE_EQUIPMENT_CREATE])"
      ></button>
    </div>

    <div class="col-2">
      <button
        pButton
        type="button"
        label="Cancelar"
        (click)="reset()"
        class="p-button-secondary"
        style="display: inline-block"
      ></button>
    </div>
  </div>
</form>
