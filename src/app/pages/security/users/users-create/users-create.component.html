<form autocomplete="off" [formGroup]="resourceForm" (ngSubmit)="submitForm()">
  <div class="p-fluid grid" style="margin-bottom: 0em; margin-top: 0em">
    <div class="col-3">
      <app-error-msg [control]="document" label="CPF"></app-error-msg>
      <input
       
        pInputText
        type="text"
        [mask]="wsConsts.MASK_CPF"
        formControlName="document"
        (blur)="searchExistDocument()"
        [class.ng-dirty]="error.hasControlErrors(document)"
      />
    </div>

    <div class="col-6">
      <app-error-msg [control]="name" label="Nome"></app-error-msg>
      <input pInputText type="text" formControlName="name" [class.ng-dirty]="error.hasControlErrors(name)" />
    </div>

    <div class="col-3">
      <app-error-msg [control]="status" label="Status"></app-error-msg>
      <p-dropdown
        inputId="dropdown"
        [showClear]="true"
        [options]="statusEnum"
        placeholder="Selecione"
        formControlName="status"
        [class.ng-dirty]="error.hasControlErrors(status)"
      >
      </p-dropdown>
    </div>
  </div>

  <div class="p-fluid grid" style="margin-bottom: 0em; margin-top: 0em">
    <div class="col-4">
      <app-error-msg [control]="birthDate" label="Data Nascimento"></app-error-msg>
      <p-calendar
        appendTo="body"
        [inline]="false"
        name="birthDate"
        [showIcon]="true"
        dateFormat="dd/mm/yy"
        class="p-calendar-sm"
        [yearNavigator]="true"
        [readonlyInput]="false"
        [monthNavigator]="true"
        [selectOtherMonths]="true"
        formControlName="birthDate"
        [class.ng-dirty]="error.hasControlErrors(birthDate)"
      >
      </p-calendar>
    </div>

    <div class="col-6">
      <app-error-msg [control]="email" label="E-mail"></app-error-msg>
      <input pInputText type="text" formControlName="email" [class.ng-dirty]="error.hasControlErrors(email)" />
    </div>
  </div>

  <br />
  <br />
  <br />

  <div class="p-fluid grid" style="margin-bottom: -1em; margin-top: 0%">
    <div class="col-2 col-offset-8">
      <button
        pButton
        type="submit"
        label="Salvar"
        [loading]="loading"
        class="ui-button-success"
        style="display: inline-block"
        [disabled]="!auth.hasAnyPermission([wsPermissions.ROLE_USERS_CREATE])"
      ></button>
    </div>

    <div class="col-2">
      <button
        pButton
        type="button"
        label="Cancelar"
        (click)="reset()"
        class="p-button-secondary"
        style="display: inline-block"
      ></button>
    </div>
  </div>
</form>
