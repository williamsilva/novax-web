<form autocomplete="off" [formGroup]="resourceForm" (ngSubmit)="submitForm()">
  <div class="p-fluid grid" style="margin-bottom: 0em; margin-top: 0em">
    <div class="col-6">
      <app-error-msg [control]="name" label="Nome"></app-error-msg>
      <input
       
        pInputText
        type="text"
        (blur)="onChange()"
        formControlName="name"
        [class.ng-dirty]="error.hasControlErrors(name)"
      />
    </div>

    <div class="col-6">
      <app-error-msg [control]="description" label="Descrição"></app-error-msg>
      <input
        pInputText
        type="text"
        formControlName="description"
        [class.ng-dirty]="error.hasControlErrors(description)"
      />
    </div>
  </div>

  <div class="p-fluid grid" style="margin-bottom: 0em; margin-top: 0em">
    <div class="col-3">
      <app-error-msg [control]="amount" label="Valor" [required]="requiredAmount"></app-error-msg>
      <p-inputNumber
        locale="pt-BR"
        currency="BRL"
        mode="currency"
        class="ng-invalid"
        formControlName="amount"
        placeholder="E.g.: 20,00"
        [class.ng-dirty]="error.hasControlErrors(amount)"
      ></p-inputNumber>
    </div>

    <div class="col-3">
      <app-error-msg [control]="status" label="Status"></app-error-msg>
      <p-dropdown
        inputId="dropdown"
        [showClear]="true"
        [options]="statusEnum"
        placeholder="Selecione"
        formControlName="status"
        [class.ng-dirty]="error.hasControlErrors(status)"
      >
      </p-dropdown>
    </div>

    <div class="col-3">
      <app-error-msg [control]="initialValidate" [required]="false" label="Validade Inicial"></app-error-msg>
      <p-calendar
        appendTo="body"
        [inline]="false"
        [showIcon]="true"
        dateFormat="dd/mm/yy"
        class="p-calendar-sm"
        name="initialValidate"
        [yearNavigator]="true"
        [readonlyInput]="false"
        [monthNavigator]="true"
        [selectOtherMonths]="true"
        formControlName="initialValidate"
        [class.ng-dirty]="error.hasControlErrors(initialValidate)"
      >
      </p-calendar>
    </div>

    <div class="col-3">
      <app-error-msg [control]="finalValidate" [required]="false" label="Validade Final"></app-error-msg>
      <p-calendar
        appendTo="body"
        [inline]="false"
        [showIcon]="true"
        dateFormat="dd/mm/yy"
        class="p-calendar-sm"
        name="finalValidate"
        [yearNavigator]="true"
        [readonlyInput]="false"
        [monthNavigator]="true"
        [selectOtherMonths]="true"
        formControlName="finalValidate"
        [class.ng-dirty]="error.hasControlErrors(finalValidate)"
      >
      </p-calendar>
    </div>
  </div>

  <br />
  <br />
  <br />

  <div class="p-fluid grid" style="margin-bottom: -1em; margin-top: 0%">
    <div class="col-2 col-offset-8">
      <button
        pButton
        type="submit"
        label="Salvar"
        [loading]="loading"
        class="ui-button-success"
        style="display: inline-block"
        [disabled]="!auth.hasAnyPermission([wsPermissions.ROLE_PRODUCTS_CREATE])"
      ></button>
    </div>

    <div class="col-2">
      <button
        pButton
        type="button"
        label="Cancelar"
        (click)="reset()"
        class="p-button-secondary"
        style="display: inline-block"
      ></button>
    </div>
  </div>
</form>
