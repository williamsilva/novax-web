<form autocomplete="off" [formGroup]="resourceForm" (ngSubmit)="submitForm()">
  <div class="p-fluid grid" style="margin-bottom: 0em; margin-top: 0em">
    <div class="col-6">
      <app-error-msg [control]="client" label="Cliente"></app-error-msg>
      <input pInputText type="text" formControlName="client" [class.ng-dirty]="error.hasControlErrors(client)" />
    </div>

    <div class="col-6">
      <app-error-msg [control]="authorizedBy" label="Autorizado"></app-error-msg>
      <p-autoComplete
        field="name"
        [minLength]="3"
        [dropdown]="true"
        [forceSelection]="true"
        formControlName="authorizedBy"
        [suggestions]="suggestions"
        placeholder="Digite para pesquisar"
        (completeMethod)="filterCountry($event)"
        [class.ng-dirty]="error.hasControlErrors(authorizedBy)"
      >
      </p-autoComplete>
    </div>
  </div>

  <div class="p-fluid grid" style="margin-bottom: 0em; margin-top: 0em">
    <div class="col-3">
      <app-error-msg [control]="status" label="Status"></app-error-msg>

      <p-dropdown
        [readonly]="true"
        inputId="dropdown"
        formControlName="status"
        [options]="statusCourtesy"
        optionDisabled="inactive"
        [autoDisplayFirst]="false"
        [class.ng-dirty]="error.hasControlErrors(status)"
      >
      </p-dropdown>
    </div>

    <div class="col-3">
      <app-error-msg [control]="document" label="CPF" [required]="false"></app-error-msg>
      <input pInputText type="text" [mask]="mask" formControlName="document" />
    </div>

    <div class="col-3">
      <app-error-msg [control]="scheduledVisitDate" label="Data Visita"></app-error-msg>
      <p-calendar
        appendTo="body"
        [inline]="false"
        [showIcon]="true"
        name="scheduledVisitDate"
        dateFormat="dd/mm/yy"
        class="p-calendar-sm"
        [yearNavigator]="true"
        [readonlyInput]="false"
        [monthNavigator]="true"
        [selectOtherMonths]="true"
        formControlName="scheduledVisitDate"
        [class.ng-dirty]="error.hasControlErrors(scheduledVisitDate)"
      >
      </p-calendar>
    </div>
  </div>

  <br />
  <br />

  <div class="p-fluid grid" style="margin-bottom: -1em; margin-top: 0%">
    <div class="col-2 col-offset-8">
      <button
        pButton
        type="submit"
        label="Salvar"
        [loading]="loading"
        class="ui-button-success"
        style="display: inline-block"
        [disabled]="!auth.hasAnyPermission([wsPermissions.ROLE_COURTESY_CREATE])"
      ></button>
    </div>

    <div class="col-2">
      <button
        pButton
        type="button"
        label="Cancelar"
        (click)="reset()"
        class="p-button-secondary"
        style="display: inline-block"
      ></button>
    </div>
  </div>
</form>
