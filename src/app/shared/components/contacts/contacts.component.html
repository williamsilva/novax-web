<div class="card">
  <div class="flex">
    <button pButton label="Novo" icon="pi pi-plus" class="p-button-success mr-2" (click)="openNew($event)"></button>

    <button
      pButton
      label="Delete"
      icon="pi pi-trash"
      class="p-button-danger"
      (click)="deleteSelectedEntries($event)"
      [disabled]="!selectedResources || !selectedResources.length"
    ></button>
  </div>
  <br />

  <p-table
    dataKey="id"
    [rowHover]="true"
    [value]="resources"
    [responsive]="true"
    [(selection)]="selectedResources"
    styleClass="p-datatable-customers p-datatable-gridlines p-datatable-sm"
  >
    <ng-template pTemplate="header">
      <tr>
        <th style="width: 3rem">
          <!-- <p-tableHeaderCheckbox></p-tableHeaderCheckbox> -->
        </th>
        <th>Nome</th>
        <th>E-mail</th>
        <th>Telefone</th>
        <th>Celular</th>
        <th style="width: 4.5rem"></th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-entry>
      <tr>
        <td>
          <p-tableCheckbox [value]="entry"></p-tableCheckbox>
        </td>
        <td>{{ entry.name }}</td>
        <td>{{ entry.email }}</td>
        <td>{{ entry.telephone | maskTelephone }}</td>
        <td>{{ entry.cellphone | maskTelephone }}</td>

        <td class="text-center">
          <a style="padding: 0 0 0 0.5rem" pTooltip="Editar" tooltipPosition="top" (click)="editEntry(entry)">
            <i class="pi true-icon pi-user-edit"></i>
          </a>
          <a style="padding: 0 0 0 0.5rem" (click)="deleteEntry(entry)" pTooltip="Excluir" tooltipPosition="top">
            <i class="pi false-icon pi-times-circle"></i>
          </a>
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="10">Não há dados para ser exibido!</td>
      </tr>
    </ng-template>
  </p-table>

  <form autocomplete="off" [formGroup]="resourceForm">
    <p-dialog
      [modal]="true"
      styleClass="p-fluid"
      [(visible)]="resourceDialog"
      [style]="{ width: '450px' }"
      [header]="editing ? 'Edição Contato' : 'Novo Contato'"
    >
      <ng-template pTemplate="content">
        <div class="p-fluid grid">
          <div class="col-12">
            <app-error-msg [control]="name" label="Nome"></app-error-msg>
            <input
              id="name"
             
              type="text"
              pInputText
              formControlName="name"
              [class.ng-dirty]="error.hasControlErrors(name)"
            />
          </div>

          <div class="col-12">
            <app-error-msg [control]="email" label="E-mail"></app-error-msg>
            <input pInputText type="email" formControlName="email" [class.ng-dirty]="error.hasControlErrors(email)" />
          </div>

          <div class="col-12">
            <app-error-msg [control]="cellphone" label="Celular"></app-error-msg>
            <input
              pInputText
              type="text"
              [mask]="maskCellphone"
              formControlName="cellphone"
              (keypress)="onChangeMaskCellphone()"
              [class.ng-dirty]="error.hasControlErrors(cellphone)"
            />
          </div>

          <div class="col-12">
            <app-error-msg [control]="telephone" label="Telefone" [required]="false"></app-error-msg>
            <input
              pInputText
              type="text"
              [mask]="maskTelephone"
              formControlName="telephone"
              (keypress)="onChangeMaskTelephone()"
            />
          </div>
        </div>
      </ng-template>

      <ng-template pTemplate="footer">
        <button
          pButton
          pRipple
          label="Cancel"
          icon="pi pi-times"
          class="p-button-text"
          (click)="hideDialog($event)"
        ></button>
        <button
          pButton
          pRipple
          label="Save"
          icon="pi pi-check"
          class="p-button-text"
          (click)="saveResources($event)"
        ></button>
      </ng-template>
    </p-dialog>
  </form>
</div>
