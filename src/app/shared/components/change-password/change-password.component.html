<form autocomplete="off" [formGroup]="resourceForm" (ngSubmit)="submitForm()">
  <div class="p-fluid grid" style="margin-bottom: 0em; margin-top: 0em">
    <div class="col-12">
      <app-error-msg [control]="name" [required]="false" label="Nome"></app-error-msg>
      <input readonly pInputText type="text" formControlName="name" [class.ng-dirty]="error.hasControlErrors(name)" />
    </div>

    <div class="col-12">
      <app-error-msg [control]="userName" [required]="false" label="Usuário"></app-error-msg>
      <input
        readonly
        pInputText
        type="text"
        formControlName="userName"
        [class.ng-dirty]="error.hasControlErrors(userName)"
      />
    </div>

    <div class="col-12">
      <app-error-msg [control]="oldPassword" label="Senha Antiga"></app-error-msg>
      <p-password
        type="text"
        [feedback]="false"
        [toggleMask]="true"
        formControlName="oldPassword"
        [class.ng-dirty]="error.hasControlErrors(oldPassword)"
      />
    </div>

    <div class="col-12">
      <app-error-msg [control]="password" label="Nova Senha"></app-error-msg>
      <p-password
        type="text"
        [feedback]="false"
        [toggleMask]="true"
        formControlName="password"
        [class.ng-dirty]="error.hasControlErrors(password)"
      />
    </div>

    <div class="col-12">
      <app-error-msg [control]="confirmPassword" label="Confirmação de Senha"></app-error-msg>
      <p-password
        type="text"
        [feedback]="false"
        [toggleMask]="true"
        formControlName="confirmPassword"
        [class.ng-dirty]="error.hasControlErrors(confirmPassword)"
      />
    </div>
  </div>

  <div class="p-fluid grid" style="margin-bottom: -1em; margin-top: 0%">
    <div class="col-offset-8"></div>
    <div class="col-4">
      <button
        pButton
        type="submit"
        label="Salvar"
        [loading]="loading"
        class="ui-button-success"
        style="display: inline-block"
        [disabled]="!auth.hasAnyPermission([wsPermissions.ROLE_USERS_CHANGE_PASSWORD])"
      ></button>
    </div>
  </div>
</form>
